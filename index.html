<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Lung Lab - Energy Study</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3A5C; --blue:#2E75B6; --light:#E8F0F8; --green:#27AE60;
    --red:#C0392B; --gold:#D4A017; --yellow:#F1C40F; --orange:#E67E22;
    --ink:#1B2733; --muted:#6B7C8C; --line:#D9E3EE;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--light);color:var(--ink);
    font-family:'DM Sans',system-ui,-apple-system,sans-serif}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    background:var(--light);position:relative}
  header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;
    padding:10px 16px 0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .h-title{font-weight:700;font-size:18px;letter-spacing:.5px}
  .h-ctx{font-size:12px;opacity:.85;margin-top:2px;min-height:15px}
  .progress{height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:8px}
  .progress > div{height:100%;background:var(--gold);border-radius:2px;width:0;transition:width .25s}
  #resumeBar{background:var(--gold);color:#3a2c00;padding:10px 16px;font-size:13px;
    display:none;align-items:center;justify-content:space-between;gap:10px}
  #resumeBar button{background:var(--navy);color:#fff;border:none;border-radius:8px;
    padding:8px 12px;font-weight:600;font-family:inherit}
  main{flex:1;padding:16px;padding-bottom:90px}
  .card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(27,58,92,.07);
    margin-bottom:14px}
  h2{font-size:20px;margin:0 0 4px;color:var(--navy)}
  .sub{color:var(--muted);font-size:14px;margin:0 0 14px;line-height:1.4}
  label{display:block;font-weight:600;font-size:14px;margin:14px 0 6px;color:var(--navy)}
  input[type=text],input[type=number],textarea,select{
    width:100%;font-family:inherit;font-size:16px;padding:12px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink)}
  textarea{min-height:74px;resize:vertical}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .pill{border:1.5px solid var(--line);background:#fff;color:var(--navy);border-radius:999px;
    padding:9px 14px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
  .pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chk{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:11px 14px;
    font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px}
  .chk.active{background:#eaf6ef;border-color:var(--green);color:#1e7a44}
  .chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .slider-row{margin:18px 0}
  .slider-head{display:flex;justify-content:space-between;align-items:baseline}
  .slider-name{font-weight:600;font-size:15px;color:var(--navy)}
  .slider-val{font-weight:700;font-size:22px;color:var(--blue);min-width:48px;text-align:right}
  .slider-val.bad{color:var(--red)}
  .anchors{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px}
  input[type=range]{width:100%;-webkit-appearance:none;height:8px;border-radius:6px;margin-top:8px;
    background:linear-gradient(var(--green),var(--green));background-size:50% 100%;
    background-repeat:no-repeat}
  input[type=range].bad{background:linear-gradient(var(--red),var(--red));background-size:50% 100%;
    background-repeat:no-repeat}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;
    border-radius:50%;background:#fff;border:3px solid var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .timer-wrap{text-align:center;padding:18px 0}
  .timer-big{font-size:64px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
  .phase{font-size:14px;font-weight:700;letter-spacing:1px;margin-top:4px}
  .btn{width:100%;font-family:inherit;font-size:16px;font-weight:600;border:none;border-radius:12px;
    padding:15px;cursor:pointer}
  .btn-primary{background:var(--navy);color:#fff}
  .btn-green{background:var(--green);color:#fff}
  .btn-gold{background:var(--gold);color:#3a2c00}
  .btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
  .btn + .btn{margin-top:10px}
  .note{background:var(--light);border-left:4px solid var(--blue);padding:10px 12px;border-radius:8px;
    font-size:13px;color:var(--navy);margin:10px 0;line-height:1.45}
  .goldbox{background:#fdf4dd;border:1px solid var(--gold);border-radius:12px;padding:14px;
    font-size:14px;color:#5a4500;line-height:1.5;margin:12px 0}
  nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;
    border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom))}
  nav button{flex:1;font-family:inherit;font-size:16px;font-weight:600;border:none;border-radius:12px;
    padding:14px}
  nav .back{flex:0 0 90px;background:#fff;color:var(--navy);border:1.5px solid var(--line)}
  nav .next{background:var(--navy);color:#fff}
  nav .next:disabled{opacity:.4}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;align-items:flex-end;
    justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:20px;
    max-height:85vh;overflow:auto}
  .modal h3{margin:0 0 6px;color:var(--navy)}
  .check-big{text-align:center;font-size:60px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .3s;
    z-index:60;white-space:nowrap}
  .toast.show{opacity:1}
  .sent-ok{background:#e7f7ee;border:1px solid var(--green);color:#1e7a44;padding:10px 12px;
    border-radius:10px;font-size:13px;text-align:center;margin-top:10px}
  .small{font-size:12px;color:var(--muted);margin-top:6px}
  .reminder-row{display:flex;gap:8px;margin-top:8px}
  .reminder-row .btn{margin:0}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-title">THE LUNG LAB - ENERGY</div>
    <div class="h-ctx" id="ctx"></div>
    <div class="progress"><div id="progBar"></div></div>
    <div style="height:8px"></div>
  </header>
  <div id="resumeBar">
    <span id="resumeText"></span>
    <span style="display:flex;gap:6px">
      <button onclick="resumeYes()">Resume</button>
      <button onclick="resumeNo()" style="background:#fff;color:#3a2c00">Restart</button>
    </span>
  </div>
  <main id="main"></main>
  <nav id="nav">
    <button class="back" id="backBtn" onclick="goBack()">Back</button>
    <button class="next" id="nextBtn" onclick="goNext()">Next</button>
  </nav>
  <div id="toast" class="toast"></div>
  <div id="modalRoot"></div>
</div>

<script>
/* ============================================================
   THE LUNG LAB - ENERGY STUDY (THC / turn-up stimulant)
   Single-file mobile web app. Host on GitHub Pages.
   Each panelist tests BOTH formulas, one per day (Day 1 / Day 2),
   blinded by 3-digit code. Take-home; calendar reminders drive
   the 15 / 30 / 60-minute check-ins.
   ============================================================ */
var SHEETS_URL = "https://script.google.com/macros/s/AKfycbzCktOJBHJxCLiwtcHfpdJxFD0cKMqqGu-M0HSl530nnU-tMfBTiZJjKpKH40SX17tB/exec";

/* ---------- State ---------- */
var S = { recordId:"", data:{}, screen:0, t0:null };
var STORE_KEY = "turnup_lungs_v1";

/* ---------- Effects cluster (correlated set, scored at every time point) ---------- */
var EFFECTS = [
  {k:"Energy", name:"Energy",            lo:"Tired",   hi:"Energized"},
  {k:"Focus",  name:"Focus / alertness", lo:"Foggy",   hi:"Sharp"},
  {k:"Buzz",   name:"Stimulation (buzzy/wired)", lo:"Calm", hi:"Very buzzy"},
  {k:"Jitter", name:"Jitteriness",       lo:"None",    hi:"Very jittery", bad:true},
  {k:"Heart",  name:"Heart racing",      lo:"Normal",  hi:"Racing", bad:true},
  {k:"Mood",   name:"Mood lift",         lo:"Flat",    hi:"Elevated/euphoric"}
];

var MOUTHFEEL = ["Tingling lips","Tingling tongue","Numbing","Cooling",
  "Buzzing sensation","Throat tingle","Dry mouth","None"];

var EFFECT_LIST = ["Energized","Focused","Jittery","Anxious","Racing heart",
  "Euphoric","Talkative","Restless","Headache","Nothing"];

/* ---------- Screen flow ---------- */
var SCREENS = ["info","baseline","dose","settle","onset",
  "w15","c15","w30","c30","w60","c60","wrap","done"];
var PHASE_LABEL = {
  info:"Setup", baseline:"Baseline", dose:"Dose", settle:"Settling", onset:"First effects",
  w15:"Wait - 15 min", c15:"15-min check-in", w30:"Wait - 30 min", c30:"30-min check-in",
  w60:"Wait - 60 min", c60:"60-min check-in", wrap:"Wrap-up", done:"Done"
};
/* check-in target minutes after T0 */
var TARGET = { w15:15, c15:15, w30:30, c30:30, w60:60, c60:60 };

/* ============================================================ */
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){} }
function load(){ try{ var r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):null; }catch(e){return null;} }
function uid(){ return "TUL-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,6); }
function el(id){ return document.getElementById(id); }
function curScreen(){ return SCREENS[S.screen]; }

/* ============================================================
   Render
   ============================================================ */
function render(){
  var name = curScreen();
  el("main").innerHTML = (RENDER[name]||function(){return "";})();
  var code=S.data.SampleCode||""; var day=S.data.Day||"";
  el("ctx").textContent = (day?day:"") + (code?("  -  code "+code):"") + "  -  "+PHASE_LABEL[name];
  el("progBar").style.width = Math.round((S.screen/(SCREENS.length-1))*100)+"%";
  el("backBtn").style.visibility = (S.screen===0||name==="done")?"hidden":"visible";
  var nb=el("nextBtn");
  if(name==="dose"||name==="settle"||name==="w15"||name==="w30"||name==="w60"||name==="done"){
    nb.style.display="none";
  } else {
    nb.style.display="block"; nb.textContent = (name==="wrap")?"Finish & submit":"Next";
  }
  bindSliders();
  validate();
  if(S._lastScreen !== name){ window.scrollTo(0,0); S._lastScreen = name; }
}

/* ----- sliders ----- */
function sliderHTML(prefix, attr){
  var key = prefix+"_"+attr.k;
  var v = (S.data[key]!=null)?S.data[key]:7.5;
  var bad = attr.bad?" bad":"";
  var pct = (v/15*100).toFixed(1);
  return '<div class="slider-row"><div class="slider-head">'
    +'<span class="slider-name">'+attr.name+'</span>'
    +'<span class="slider-val'+bad+'" id="val_'+key+'">'+(+v).toFixed(1)+'</span></div>'
    +'<input type="range" class="rng'+bad+'" min="0" max="15" step="0.1" value="'+v+'" '
    +'data-key="'+key+'" style="background-size:'+pct+'% 100%">'
    +'<div class="anchors"><span>'+attr.lo+'</span><span>'+attr.hi+'</span></div></div>';
}
function effectSliders(prefix){ return EFFECTS.map(function(a){return sliderHTML(prefix,a);}).join(''); }
function bindSliders(){
  document.querySelectorAll('input[type=range].rng').forEach(function(r){
    r.addEventListener('input', function(){
      var k=this.getAttribute('data-key');
      S.data[k]=parseFloat(this.value);
      el('val_'+k).textContent=parseFloat(this.value).toFixed(1);
      this.style.backgroundSize=(this.value/15*100)+"% 100%";
    });
  });
}

/* ----- pills / checks ----- */
function pillSet(key,val,multi){
  if(multi){ var arr=S.data[key]||[]; var i=arr.indexOf(val);
    if(i>=0)arr.splice(i,1); else arr.push(val); S.data[key]=arr; }
  else { S.data[key]=val; }
  var y=window.scrollY; save(); render(); window.scrollTo(0,y);
}
function pillHTML(key,opts,multi){
  var cur=S.data[key];
  return '<div class="pills">'+opts.map(function(o){
    var active = multi ? ((cur||[]).indexOf(o)>=0) : (cur===o);
    return '<button class="pill'+(active?' active':'')+'" '
      +'onclick="pillSet(\''+key+'\',\''+o.replace(/'/g,"\\'")+'\','+(multi?'true':'false')+')">'+o+'</button>';
  }).join('')+'</div>';
}
function chkHTML(key,opts){
  var cur=S.data[key]||[];
  return '<div class="chk-grid">'+opts.map(function(o){
    var active=cur.indexOf(o)>=0;
    return '<div class="chk'+(active?' active':'')+'" '
      +'onclick="pillSet(\''+key+'\',\''+o.replace(/'/g,"\\'")+'\',true)">'
      +(active?'&#10003; ':'')+o+'</div>';
  }).join('')+'</div>';
}
function bindText(){
  document.querySelectorAll('[data-txt]').forEach(function(t){
    t.addEventListener('input',function(){ S.data[this.getAttribute('data-txt')]=this.value; validate(); });
    t.addEventListener('change',function(){ save(); });
  });
}

/* ============================================================
   Screens
   ============================================================ */
var RENDER = {};

RENDER.info = function(){
  setTimeout(bindText,0);
  return '<div class="card"><h2>Energy Study</h2>'
    +'<p class="sub">You will test one sample today and the other on a different day. '
    +'You will: rate how you feel now, take 2-3 normal hits, then check in at 15, 30, and 60 minutes. '
    +'Set the reminders when prompted so you do not miss a check-in.</p>'
    +'<label>Your name</label><input type="text" data-txt="Name" value="'+(S.data.Name||'')+'">'
    +'<label>Which day is this?</label>'
    + pillHTML("Day",["Day 1","Day 2"],false)
    +'<label>Today\'s sample code</label><input type="text" data-txt="SampleCode" value="'+(S.data.SampleCode||'')+'">'
    +'<div class="small">Use the 3-digit code on the sample you were given. Do not guess which formula it is.</div>'
    +'<label>Blind flavor code (if given)</label><input type="text" data-txt="FlavorCode" value="'+(S.data.FlavorCode||'')+'">'
    +'<label>How often do you vape / use THC?</label>'
    + pillHTML("Usage_Frequency",["Daily","A few times a week","Occasionally","Rarely / new to it"],false)
    +'<label>Your tolerance</label>'
    + pillHTML("Usage_Tolerance",["Low","Medium","High"],false)
    +'<div class="note">Your name is required to start. Use the same name on both days so your two days can be paired. '
    +'Please do this on your own - don\'t compare notes with anyone until you\'ve finished both days.</div>'
    +'</div>';
};

RENDER.baseline = function(){
  return '<div class="card"><h2>Baseline - before your hit</h2>'
    +'<p class="sub">How do you feel <b>right now</b>, before taking anything? '
    +'This is what we compare your check-ins against.</p>'
    + effectSliders("Base")
    +'</div>';
};

RENDER.dose = function(){
  return '<div class="card"><h2>Take your hits</h2>'
    +'<p class="sub">Take <b>2-3 normal hits</b> the way you usually would.</p>'
    +'<div class="note">Tapping below starts your clock and sets up the 15 / 30 / 60-minute reminders.</div>'
    +'<button class="btn btn-green" onclick="doDose()">I took my hits - start the clock</button>'
    +'</div>';
};

RENDER.settle = function(){
  return '<div class="card"><h2>Settle for a moment</h2>'
    +'<p class="sub">Give it a couple of minutes, then we will ask about the flavor, any mouth tingling, and the first effects.</p>'
    +'<div class="timer-wrap"><div class="timer-big" id="tBig">2:00</div>'
    +'<div class="phase" style="color:var(--blue)">SETTLING</div></div>'
    +'<button class="btn btn-ghost" onclick="endSettle()">Skip - I\'m ready now</button>'
    +'</div>';
};

RENDER.onset = function(){
  setTimeout(bindText,0);
  return '<div class="card"><h2>The flavor</h2>'
    +'<p class="sub">Rate the flavor of the hits you just took.</p>'
    + sliderHTML("Flavor",{k:"Liking",name:"Overall flavor liking",lo:"Dislike",hi:"Love it"})
    +'<label>What did you taste? Any notes?</label>'
    +'<textarea data-txt="Flavor_Notes">'+(S.data.Flavor_Notes||'')+'</textarea>'
    +'</div>'
    +'<div class="card"><h2>Mouthfeel</h2>'
    +'<p class="sub">Any unusual physical sensation in your mouth, lips, or throat?</p>'
    + sliderHTML("Mouthfeel",{k:"Intensity",name:"Tingling / sensation strength",lo:"None",hi:"Strong"})
    +'<label>What kind? (tap all that apply)</label>'
    + chkHTML("Mouthfeel_Types",MOUTHFEEL)
    +'<label>Mouthfeel notes</label>'
    +'<textarea data-txt="Mouthfeel_Notes">'+(S.data.Mouthfeel_Notes||'')+'</textarea>'
    +'</div>'
    +'<div class="card"><h2>How you feel now</h2>'
    +'<p class="sub">First effects, a few minutes in.</p>'
    + effectSliders("On")
    +'<label>Anything else right now?</label>'
    +'<textarea data-txt="On_Notes">'+(S.data.On_Notes||'')+'</textarea>'
    +'</div>';
};

function waitScreen(id){
  var t=TARGET[id]; var rem=remainingTo(t);
  return '<div class="card"><h2>Waiting for your '+t+'-minute check-in</h2>'
    +'<p class="sub">You can put your phone down. Your calendar reminder will buzz when it is time. '
    +'Come back then.</p>'
    +'<div class="timer-wrap"><div class="timer-big" id="tWait">'+fmt(rem)+'</div>'
    +'<div class="phase" style="color:var(--gold)">UNTIL '+t+'-MIN CHECK-IN</div></div>'
    +'<div class="goldbox">If your reminder did not set, set a phone timer for '+t+' minutes from your hit.</div>'
    +'<button class="btn btn-primary" onclick="forceCheck()">I\'m ready - do this check-in now</button>'
    +'</div>';
}
RENDER.w15=function(){return waitScreen("w15");};
RENDER.w30=function(){return waitScreen("w30");};
RENDER.w60=function(){return waitScreen("w60");};

function checkScreen(prefix,t){
  setTimeout(bindText,0);
  return '<div class="card"><h2>'+t+'-minute check-in</h2>'
    +'<p class="sub">Same six questions, so we can see how the effect changed since your last check-in.</p>'
    + effectSliders(prefix)
    +'<label>Notes</label>'
    +'<textarea data-txt="'+prefix+'_Notes">'+(S.data[prefix+'_Notes']||'')+'</textarea>'
    +'</div>';
}
RENDER.c15=function(){return checkScreen("C15",15);};
RENDER.c30=function(){return checkScreen("C30",30);};
RENDER.c60=function(){return checkScreen("C60",60);};

RENDER.wrap = function(){
  setTimeout(bindText,0);
  var isDay2 = (S.data.Day==="Day 2");
  var headToHead = isDay2
    ? '<div class="card"><h2>Head-to-head</h2>'
      +'<p class="sub">You\'ve now tried both samples - today\'s and the one from your other day. '
      +'This part decides the study, so take a second with it.</p>'
      +'<label>Did the two samples feel different?</label>'
      + pillHTML("HH_Different",["Clearly different","Slightly different","Couldn\'t tell apart"],false)
      +'<label>Which did you prefer overall?</label>'
      + pillHTML("HH_Prefer",["Today\'s sample","The other day\'s","No preference"],false)
      +'<label>Which felt more effective for energy?</label>'
      + pillHTML("HH_MoreEffective",["Today\'s sample","The other day\'s","About the same"],false)
      +'<label>Which would you actually use or buy?</label>'
      + pillHTML("HH_UseBuy",["Today\'s sample","The other day\'s","Either","Neither"],false)
      +'<label>How confident are you in that?</label>'
      + pillHTML("HH_Confidence",["Very","Somewhat","Not very"],false)
      +'<label>Why? What was the difference?</label>'
      +'<textarea data-txt="HH_Why">'+(S.data.HH_Why||'')+'</textarea>'
      +'</div>'
    : '<div class="card"><div class="note">This is your first sample. On your second day you\'ll try the other one, '
      +'and we\'ll ask you to compare the two directly.</div></div>';
  return '<div class="card"><h2>Wrap-up</h2>'
    +'<label>Are you still feeling it?</label>'
    + pillHTML("Wrap_StillFeeling",["Yes, strongly","Yes, faintly","No"],false)
    +'<label>How long did the main effect last?</label>'
    + pillHTML("Wrap_Duration",["Under 15 min","15-30 min","30-60 min","1-2 hours","Over 2 hours"],false)
    +'<label>What were the effects? (tap all that apply)</label>'
    + chkHTML("Wrap_Effects",EFFECT_LIST)
    +'</div>'
    +'<div class="card"><h2>Overall</h2>'
    + sliderHTML("Wrap",{k:"LikingOverall",name:"Overall, how much did you like it",lo:"Disliked",hi:"Loved it"})
    +'<label>Would you use this sample again?</label>'
    + pillHTML("Wrap_UseAgain",["Yes","Maybe","No"],false)
    +'<label>Any other comments</label>'
    +'<textarea data-txt="Wrap_Comments">'+(S.data.Wrap_Comments||'')+'</textarea>'
    +'</div>'
    + headToHead;
};

RENDER.done = function(){
  return '<div class="card" style="text-align:center">'
    +'<div class="check-big">&#9989;</div>'
    +'<h2>'+(S.data.Day||'')+' complete - thank you!</h2>'
    +'<p class="sub">Your responses were submitted. If this was Day 1, remember to test the other sample on your second day, using the same name.</p>'
    + (S.data._finalSent?'<div class="sent-ok">Data submitted - verify in sheet</div>':'')
    +'<button class="btn btn-ghost" style="margin-top:12px" onclick="exportCSV()">Export backup (CSV)</button>'
    +'</div>';
};

/* ============================================================
   Navigation
   ============================================================ */
function validate(){
  var name=curScreen(); var ok=true;
  if(name==="info") ok = !!S.data.Name;
  el("nextBtn").disabled = !ok;
}
function goNext(){
  var name=curScreen();
  if(name==="info" && !S.data.Name){ toast("Please enter your name"); return; }
  if(name==="onset"){ submitInterim(); }   // capture early data in case they drop off
  if(name==="wrap"){ submitFinal(); }
  advance();
}
function advance(){ if(S.screen<SCREENS.length-1){ S.screen++; } save(); render(); }
function goBack(){ if(S.screen>0){ S.screen--; save(); render(); } }

function doDose(){
  S.t0 = Date.now();
  S.data.T0_Time = new Date(S.t0).toLocaleString();
  save(); openReminderModal();
}

/* ----- timers ----- */
var settleTimer=null;
function startSettle(){
  clearInterval(settleTimer);
  var end=Date.now()+120*1000;
  settleTimer=setInterval(function(){
    var rem=Math.max(0,Math.round((end-Date.now())/1000));
    var t=el("tBig"); if(t)t.textContent=fmt(rem);
    if(rem<=0){ clearInterval(settleTimer); endSettle(); }
  },250);
}
function endSettle(){ clearInterval(settleTimer); advance(); }

var waitTimer=null;
function remainingTo(min){
  if(!S.t0) return min*60;
  return Math.max(0, min*60 - Math.round((Date.now()-S.t0)/1000));
}
function startWait(){
  clearInterval(waitTimer);
  var t=TARGET[curScreen()];
  waitTimer=setInterval(function(){
    var rem=remainingTo(t);
    var w=el("tWait"); if(w)w.textContent=fmt(rem);
    if(rem<=0){ clearInterval(waitTimer); chime(); }
  },500);
}
function forceCheck(){ clearInterval(waitTimer); advance(); }
function fmt(s){ var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }

/* ============================================================
   Reminder modal + calendar (one .ics with three events)
   ============================================================ */
function openReminderModal(){
  openModal(
    '<h3>Set your check-in reminders</h3>'
    +'<p class="sub">This adds calendar alarms at 15, 30, and 60 minutes. They fire even if your phone is locked. '
    +'Add them now.</p>'
    + '<div class="reminder-row">'
    + '<button class="btn btn-gold" onclick="downloadICS()">Add all 3 to calendar</button>'
    + '</div>'
    + '<p class="small" style="margin-top:10px">Google Calendar (one at a time):</p>'
    + '<div class="reminder-row">'
    + '<button class="btn btn-ghost" onclick="googleCal(15)">+15</button>'
    + '<button class="btn btn-ghost" onclick="googleCal(30)">+30</button>'
    + '<button class="btn btn-ghost" onclick="googleCal(60)">+60</button>'
    + '</div>'
    +'<button class="btn btn-primary" style="margin-top:16px" onclick="closeModalThen(advance)">Done - continue</button>'
  );
}
function pad(n){return (n<10?"0":"")+n;}
function icsStamp(d){
  return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"
    +pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+"Z";
}
function vevent(min){
  var start=new Date((S.t0||Date.now())+min*60000);
  var end=new Date(start.getTime()+5*60000);
  return ["BEGIN:VEVENT","UID:"+S.recordId+"-"+min+"@turnuplungs",
    "DTSTAMP:"+icsStamp(new Date()),"DTSTART:"+icsStamp(start),"DTEND:"+icsStamp(end),
    "SUMMARY:Lung Lab (Energy) - "+min+"-minute check-in",
    "DESCRIPTION:Open The Lung Lab app and do your "+min+"-minute check-in.",
    "BEGIN:VALARM","TRIGGER:PT0M","ACTION:DISPLAY",
    "DESCRIPTION:Lung Lab Energy - "+min+"-min check-in","END:VALARM","END:VEVENT"].join("\r\n");
}
function downloadICS(){
  var ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TurnUpLungs//Test//EN","CALSCALE:GREGORIAN",
    vevent(15),vevent(30),vevent(60),"END:VCALENDAR"].join("\r\n");
  var blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="turnup-reminders.ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast("3 reminders downloaded - tap to add");
}
function googleCal(min){
  var start=new Date((S.t0||Date.now())+min*60000);
  var end=new Date(start.getTime()+5*60000);
  var url="https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent("Lung Lab (Energy) - "+min+"-minute check-in")
    +"&dates="+icsStamp(start)+"/"+icsStamp(end)
    +"&details="+encodeURIComponent("Open The Lung Lab app and do your "+min+"-minute check-in.");
  window.open(url,"_blank");
}

/* ============================================================
   Audio chime (best-effort, only if screen on)
   ============================================================ */
function chime(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.2,ctx.currentTime); o.start();
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1.2); o.stop(ctx.currentTime+1.2);
  }catch(e){}
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification("The Lung Lab - Energy","Time for your check-in"); }catch(e){}
  }
}

/* ============================================================
   Modals
   ============================================================ */
function openModal(inner){ el("modalRoot").innerHTML='<div class="modal-bg"><div class="modal">'+inner+'</div></div>'; }
function closeModal(){ el("modalRoot").innerHTML=""; }
function closeModalThen(fn){ closeModal(); fn(); }

/* ============================================================
   Data
   ============================================================ */
var COLUMNS = [
  "RecordId","Timestamp","Phase","Day","Name","Usage_Frequency","Usage_Tolerance","SampleCode","FlavorCode","T0_Time",
  "Base_Energy","Base_Focus","Base_Buzz","Base_Jitter","Base_Heart","Base_Mood",
  "Flavor_Liking","Flavor_Notes",
  "Mouthfeel_Intensity","Mouthfeel_Types","Mouthfeel_Notes",
  "On_Energy","On_Focus","On_Buzz","On_Jitter","On_Heart","On_Mood","On_Notes",
  "C15_Energy","C15_Focus","C15_Buzz","C15_Jitter","C15_Heart","C15_Mood","C15_Notes",
  "C30_Energy","C30_Focus","C30_Buzz","C30_Jitter","C30_Heart","C30_Mood","C30_Notes",
  "C60_Energy","C60_Focus","C60_Buzz","C60_Jitter","C60_Heart","C60_Mood","C60_Notes",
  "Wrap_StillFeeling","Wrap_Duration","Wrap_Effects","Wrap_LikingOverall","Wrap_UseAgain","Wrap_Comments",
  "HH_Different","HH_Prefer","HH_MoreEffective","HH_UseBuy","HH_Confidence","HH_Why"
];
function buildRow(phase){
  var d=S.data;
  var get=function(k){ var v=d[k]; if(Array.isArray(v))return v.join("; "); return (v==null)?"":v; };
  return COLUMNS.map(function(c){
    if(c==="RecordId")return S.recordId;
    if(c==="Timestamp")return new Date().toLocaleString();
    if(c==="Phase")return phase;
    return get(c);
  });
}
function sendRow(row){
  try{
    fetch(SHEETS_URL,{method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({row:row})});
  }catch(e){}
  try{ var b=JSON.parse(localStorage.getItem("tul_backup")||"[]");
    b.push(row); localStorage.setItem("tul_backup",JSON.stringify(b)); }catch(e){}
}
function submitInterim(){ if(S.data._interimSent)return; sendRow(buildRow("Onset")); S.data._interimSent=true; save(); }
function submitFinal(){ if(S.data._finalSent)return; sendRow(buildRow("Final")); S.data._finalSent=true; save(); }

function exportCSV(){
  var b=[]; try{ b=JSON.parse(localStorage.getItem("tul_backup")||"[]"); }catch(e){}
  var esc=function(v){ v=(v==null)?"":String(v); return '"'+v.replace(/"/g,'""')+'"'; };
  var lines=[COLUMNS.map(esc).join(",")];
  b.forEach(function(r){ lines.push(r.map(esc).join(",")); });
  var blob=new Blob([lines.join("\n")],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="turnup-backup.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ============================================================
   Toast + resume + boot
   ============================================================ */
var toastT=null;
function toast(msg){ var t=el("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},1800); }

function showResume(saved){
  el("resumeBar").style.display="flex";
  el("resumeText").textContent="In progress - "+(PHASE_LABEL[SCREENS[saved.screen]]||"");
  S._pending=saved;
}
function resumeYes(){
  S=S._pending; el("resumeBar").style.display="none"; render();
  var n=curScreen();
  if(n==="settle") startSettle();
  if(n==="w15"||n==="w30"||n==="w60") startWait();
}
function resumeNo(){ localStorage.removeItem(STORE_KEY); el("resumeBar").style.display="none"; initFresh(); }

function initFresh(){ S={recordId:uid(),data:{},screen:0,t0:null}; save(); render(); }
function boot(){
  if("Notification" in window && Notification.permission==="default"){
    try{ Notification.requestPermission(); }catch(e){}
  }
  var saved=load();
  if(saved && saved.data && (saved.data.Name||saved.screen>0)){ render(); showResume(saved); }
  else { initFresh(); }
}

/* hook timers when those screens render */
var _render=render;
render=function(){ _render(); var n=curScreen();
  if(n==="settle") startSettle();
  if(n==="w15"||n==="w30"||n==="w60") startWait();
};

boot();
</script>
